<!doctype html>
<html>
<head><meta charset="utf-8"><title>Mirror client-logic harness</title></head>
<body>
<a id="dl">download anchor</a>
<script>
// ---- VERBATIM from src/lib/image.ts (types stripped) --------------------
function meanLuminance(ctx, w, h) {
  const { data } = ctx.getImageData(0, 0, w, h);
  let sum = 0;
  let n = 0;
  for (let i = 0; i < data.length; i += 40) {
    sum += 0.299 * data[i] + 0.587 * data[i + 1] + 0.114 * data[i + 2];
    n++;
  }
  return n ? sum / n : 0;
}
// ---- VERBATIM from CompareViewer.tsx drawCover --------------------------
function drawCover(ctx, img, dx, dy, dw, dh) {
  const ir = img.width / img.height;
  const tr = dw / dh;
  let sx = 0, sy = 0, sw = img.width, sh = img.height;
  if (ir > tr) { sw = img.height * tr; sx = (img.width - sw) / 2; }
  else { sh = img.width / tr; sy = (img.height - sh) / 2; }
  ctx.drawImage(img, sx, sy, sw, sh, dx, dy, dw, dh);
}
// ---- VERBATIM constant from src/lib/checklist.ts ------------------------
const LIGHTING_DELTA_THRESHOLD = 28;

// Helper: a solid-color frame of a given gray level.
function solidCanvas(gray, w = 240, h = 320) {
  const c = document.createElement('canvas');
  c.width = w; c.height = h;
  const ctx = c.getContext('2d');
  ctx.fillStyle = `rgb(${gray},${gray},${gray})`;
  ctx.fillRect(0, 0, w, h);
  return { c, ctx };
}
function loadImg(src) {
  return new Promise((res, rej) => {
    const i = new Image();
    i.onload = () => res(i);
    i.onerror = () => rej(new Error('img load'));
    i.src = src;
  });
}

async function run() {
  const results = {};

  // ===== ITEM 6: lighting-drift warning on genuinely different lighting =====
  // "last session" = well-lit frame; luminance stored as lastLighting.
  const bright = solidCanvas(210);
  const lastLighting = meanLuminance(bright.ctx, 240, 320);
  // A new, genuinely darker frame (bad lighting).
  const dark = solidCanvas(45);
  const darkLum = meanLuminance(dark.ctx, 240, 320);
  // A new frame under near-identical lighting.
  const similar = solidCanvas(205);
  const similarLum = meanLuminance(similar.ctx, 240, 320);

  const deltaDark = Math.abs(darkLum - lastLighting);
  const deltaSimilar = Math.abs(similarLum - lastLighting);

  results.lighting = {
    lastLighting: +lastLighting.toFixed(1),
    darkLum: +darkLum.toFixed(1),
    similarLum: +similarLum.toFixed(1),
    threshold: LIGHTING_DELTA_THRESHOLD,
    deltaDark: +deltaDark.toFixed(1),
    deltaSimilar: +deltaSimilar.toFixed(1),
    warnFiresOnDark: deltaDark > LIGHTING_DELTA_THRESHOLD,     // expect true
    warnSilentOnSimilar: !(deltaSimilar > LIGHTING_DELTA_THRESHOLD), // expect true
  };

  // ===== ITEM 4: export pipeline produces a real downloadable image ========
  // Two distinct source "photos" (data URIs), different aspect ratios so
  // drawCover's crop branch is exercised.
  const mk = (w, h, color) => {
    const c = document.createElement('canvas'); c.width = w; c.height = h;
    const x = c.getContext('2d'); x.fillStyle = color; x.fillRect(0, 0, w, h);
    x.fillStyle = '#fff'; x.fillRect(w/2 - 10, h/2 - 10, 20, 20);
    return c.toDataURL('image/png');
  };
  const ia = await loadImg(mk(400, 300, '#c33'));  // landscape
  const ib = await loadImg(mk(300, 500, '#33c'));  // portrait

  const cellW = 600, cellH = 800, pad = 24, footer = 64;
  const canvas = document.createElement('canvas');
  canvas.width = cellW * 2 + pad * 3;
  canvas.height = cellH + pad * 2 + footer;
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = '#0d0f12';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  drawCover(ctx, ia, pad, pad, cellW, cellH);
  drawCover(ctx, ib, pad * 2 + cellW, pad, cellW, cellH);

  const blob = await new Promise((res, rej) =>
    canvas.toBlob((b) => (b ? res(b) : rej(new Error('toBlob failed'))), 'image/jpeg', 0.92));
  const url = URL.createObjectURL(blob);

  results.export = {
    canvasW: canvas.width,
    canvasH: canvas.height,
    blobType: blob.type,
    blobBytes: blob.size,
    blobNonEmpty: blob.size > 1000,
  };

  // Wire the real download anchor exactly like the component (href + download).
  const a = document.getElementById('dl');
  a.href = url;
  a.download = 'mirror-comparison.jpg';

  window.__results = results;
  window.__ready = true;
  // Trigger the download so the runner can capture it as a real browser event.
  a.click();
}
run().catch((e) => { window.__results = { error: String(e) }; window.__ready = true; });
</script>
</body>
</html>
